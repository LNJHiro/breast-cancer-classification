<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatMammo - Assistente Virtual</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

    <div class="dashboard-bg">
        
        <model-viewer 
            id="robo-mammo"
            src="{{ url_for('static', filename='Robo 3D.glb') }}" 
            alt="Robô ChatMammo 3D"
            camera-controls
            camera-orbit="0deg 80deg 100%" 
            camera-target="0m 0m 0m"
            disable-zoom
            disable-pan
            shadow-intensity="1"
            class="robo-3d-overlay">
        </model-viewer>

        <main class="ui-layout">

            <aside id="sidebar" class="glass-panel side-column left-column">
                <header class="sidebar-header">
                    <h1>ChatMammo</h1>
                    <button id="btn-theme-toggle" class="btn-theme"> Tema Claro</button>
                </header>
                
                <button id="btn-novo-chat" onclick="criarNovoChat()">
                    <span class="material-symbols-outlined">add</span> Nova Conversa
                </button>
                <div id="lista-chats"></div>
            </aside>

            <section class="center-stage">
                <div class="chat-overlay">
                    <div class="chat-header">
                        <div class="mini-avatar"></div>
                        <span class="dots">ChatMammo - Assistente Virtual</span>
                        <a href="{{ url_for('home') }}" class="btn-home">Voltar para Home</a>
                    </div>

                    <div id="chatHistory" class="chat-history"></div>
                    
                    <div class="chat-input-box">
                        <input type="text" id="userInput" placeholder="Digite suas dúvidas..." autocomplete="off" onkeypress="handleKeyPress(event)">
                        <button id="micBtn" class="mic-btn" title="Ativar microfone" onclick="toggleMicrophone()">
                            <span class="material-symbols-outlined mic-icon">mic</span>
                        </button>
                        <button id="sendBtn" onclick="sendMessage()">
                            <span class="material-symbols-outlined send-icon">send</span>
                        </button>
                    </div>
                </div>
            </section>

            <aside class="side-column right-column">
                <div class="glass-panel chart-panel">
                    <p class="panel-title" id="tituloGrafico">Estatísticas Dinâmicas</p>
                    <canvas id="meuGrafico" style="display: none; width: 100%;"></canvas>
                    <div id="chartPlaceholder" style="text-align:center; padding: 30px 0; color: rgba(255,255,255,0.5); font-size: 0.9em;">
                        Faça uma pergunta sobre estatísticas para gerar um gráfico dinâmico.
                    </div>
                </div>
                
                <div class="glass-panel list-panel">
                    <p class="panel-title">Queries</p>
                    <ul>
                        <li><span class="icon">♥</span> Breast Cancer Queries</li>
                        <li><span class="icon">📄</span> Resource Library</li>
                    </ul>
                </div>
            </aside>

        </main>
    </div> 

    <div id="modal-delete" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Excluir Conversa</h3>
            <p>Tem certeza que deseja excluir este histórico permanentemente?</p>
            <div class="modal-buttons">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-confirmar" onclick="confirmarExclusao()">Excluir</button>
            </div>
        </div>
    </div>
    
    <script>
        let graficoAtual = null;
        let audioAtual = null;      
        let botaoAudioAtivo = null; 
        let chatAtualId = null; 
        let chatIdParaExcluir = null;

        function getRobo() {
            return document.getElementById('robo-mammo');
        }

        function roboOuvindo() {
            const robo = getRobo();
            if (robo) robo.setAttribute('camera-orbit', '30deg 75deg 85%');
        }

        function roboRespondendo() {
            const robo = getRobo();
            if (robo) robo.setAttribute('camera-orbit', '-20deg 80deg 95%');
        }

        function roboDescansando() {
            const robo = getRobo();
            if (robo) robo.setAttribute('camera-orbit', '0deg 80deg 100%');
        }

        window.onload = async () => {
            await carregarListaDeChats();
            // Se não há chat carregado ainda e há chats disponíveis, carregar o último
            if (!chatAtualId) {
                const response = await fetch('/api/chats');
                const chats = await response.json();
                if (chats.length > 0) {
                    await carregarConversa(chats[chats.length - 1].id);
                }
            }
        };

        async function carregarListaDeChats() {
            const response = await fetch('/api/chats');
            const chats = await response.json();
            const listaDiv = document.getElementById('lista-chats');
            listaDiv.innerHTML = '';

            if (chats.length === 0) {
                await criarNovoChat();
                return;
            }

            chats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat.id === chatAtualId ? 'ativo' : ''}`;
                
                const spanTitulo = document.createElement('span');
                spanTitulo.innerText = chat.titulo;
                spanTitulo.style.flex = "1";
                spanTitulo.onclick = () => carregarConversa(chat.id);

                const btnExcluir = document.createElement('button');
                btnExcluir.className = 'btn-excluir';
                btnExcluir.innerHTML = '<span class="material-symbols-outlined">delete</span>';
                btnExcluir.onclick = (e) => {
                    e.stopPropagation(); 
                    excluirChat(chat.id); 
                };

                item.appendChild(spanTitulo);
                item.appendChild(btnExcluir);
                listaDiv.appendChild(item);
            });
        }

        async function criarNovoChat() {
            const response = await fetch('/api/chat/novo', { method: 'POST' });
            const data = await response.json();
            chatAtualId = data.id;
            await carregarListaDeChats();
            await carregarConversa(data.id);
        }

        async function carregarConversa(id) {
            if (chatAtualId !== id) {
                chatAtualId = id;
            }
            document.getElementById('chatHistory').innerHTML = ''; 
            
            document.getElementById('meuGrafico').style.display = 'none';
            document.getElementById('chartPlaceholder').style.display = 'block';
            document.getElementById('tituloGrafico').innerText = 'Estatísticas Dinâmicas';
            if (graficoAtual) graficoAtual.destroy();

            const response = await fetch(`/api/chat/${id}`);
            const data = await response.json();

            if (data.mensagens.length === 0) {
                appendMessage("Olá! Sou o ChatMammo. Estou aqui para tirar suas dúvidas sobre nódulos, tumores de mama e saúde da mulher.<br><br>Tente me perguntar: <strong>\"Qual a probabilidade de ter câncer de mama?\"</strong>", "bot-message", false);
            } else {
                data.mensagens.forEach(msg => {
                    if (msg.role === 'user') {
                        appendMessage(msg.content, "user-message", false);
                    } else if (msg.role === 'assistant') {
                        try {
                            const jsonObj = JSON.parse(msg.content);
                            appendMessage(jsonObj.texto, "bot-message", false);
                            if (jsonObj.grafico && jsonObj.grafico.exibir) {
                                desenharGrafico(jsonObj.grafico);
                            }
                        } catch (e) {
                            appendMessage(msg.content, "bot-message", false);
                        }
                    }
                });
            }
        }

        function excluirChat(id) {
            chatIdParaExcluir = id; 
            document.getElementById('modal-delete').style.display = 'flex'; 
        }

        function fecharModal() {
            chatIdParaExcluir = null;
            document.getElementById('modal-delete').style.display = 'none'; 
        }

        async function confirmarExclusao() {
            if (!chatIdParaExcluir) return;
            const id = chatIdParaExcluir;
            
            fecharModal(); 

            await fetch(`/api/chat/${id}`, { method: 'DELETE' });
            
            if (chatAtualId === id) {
                chatAtualId = null;
                document.getElementById('chatHistory').innerHTML = '';
                document.getElementById('meuGrafico').style.display = 'none';
                document.getElementById('chartPlaceholder').style.display = 'block';
                document.getElementById('tituloGrafico').innerText = 'Estatísticas Dinâmicas';
            }
            await carregarListaDeChats();
            
            // Se não há mais chats, criar um novo
            const response = await fetch('/api/chats');
            const chats = await response.json();
            if (chats.length === 0) {
                await criarNovoChat();
            } else if (!chatAtualId) {
                await carregarConversa(chats[chats.length - 1].id);
            }
        }

        async function falarTexto(texto, btnElement) {
            const clicouNoMesmo = (botaoAudioAtivo === btnElement);

            if (audioAtual) {
                audioAtual.pause();
                audioAtual.currentTime = 0;
            }

            if (botaoAudioAtivo) {
                botaoAudioAtivo.innerHTML = '<span class="material-symbols-outlined">volume_up</span> Ouvir';
                botaoAudioAtivo = null;
            }

            if (clicouNoMesmo) {
                return;
            }

            botaoAudioAtivo = btnElement;
            botaoAudioAtivo.innerHTML = '<span class="material-symbols-outlined">hourglass_empty</span> Carregando...';

            try {
                const response = await fetch('/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: texto })
                });

                if (!response.ok) throw new Error("Erro ao gerar áudio");

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);

                audioAtual = new Audio(audioUrl);
                
                if (botaoAudioAtivo !== btnElement) {
                    return; 
                }

                botaoAudioAtivo.innerHTML = '<span class="material-symbols-outlined">stop_circle</span> Parar';
                audioAtual.play();

                audioAtual.onended = () => {
                    if (botaoAudioAtivo === btnElement) {
                        botaoAudioAtivo.innerHTML = '<span class="material-symbols-outlined">volume_up</span> Ouvir';
                        botaoAudioAtivo = null;
                    }
                };

            } catch (error) {
                console.error(error);
                if (botaoAudioAtivo === btnElement) {
                    botaoAudioAtivo.innerHTML = '<span class="material-symbols-outlined">error</span> Erro';
                    setTimeout(() => {
                        if (botaoAudioAtivo === btnElement) {
                            botaoAudioAtivo.innerHTML = '<span class="material-symbols-outlined">volume_up</span> Ouvir';
                            botaoAudioAtivo = null;
                        }
                    }, 2000);
                }
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const message = inputField.value.trim();
            
            // Se não há mensagem, retornar
            if (!message) {
                alert('Por favor, digite uma mensagem.');
                return;
            }
            if (!chatAtualId) return;

            // Exibir mensagem do usuário se houver texto
            if (message) {
                appendMessage(message, "user-message", false);
            }
            inputField.value = "";

            roboOuvindo();

            // Exibir balão de carregamento com 3 pontinhos
            const typingElement = appendTyping();

            try {
                roboRespondendo();

                const payload = {
                    message: message,
                    chat_id: chatAtualId
                };

                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                // Remover o balão de carregamento
                if (typingElement && typingElement.parentNode) {
                    typingElement.remove();
                }
                
                if (data.texto) {
                    appendMessage(data.texto, "bot-message", true); 
                } else if (data.error) {
                    appendMessage("Desculpe, ocorreu um erro.", "bot-message", false);
                }

                if (data.grafico && data.grafico.exibir) {
                    desenharGrafico(data.grafico);
                }

                if (data.titulo) {
                    carregarListaDeChats();
                }

            } catch (error) {
                // Remover o balão de carregamento em caso de erro
                if (typingElement && typingElement.parentNode) {
                    typingElement.remove();
                }
                appendMessage("Falha ao conectar com o servidor.", "bot-message", false);
            } finally {
                setTimeout(() => {
                    roboDescansando();
                }, 2000);
            }
        }

        function appendTyping() {
            const chatBox = document.getElementById("chatHistory");
            const typingContainer = document.createElement("div");
            typingContainer.className = "message bot-typing";
            
            const dot1 = document.createElement("span");
            dot1.className = "typing-dot";
            
            const dot2 = document.createElement("span");
            dot2.className = "typing-dot";
            
            const dot3 = document.createElement("span");
            dot3.className = "typing-dot";
            
            typingContainer.appendChild(dot1);
            typingContainer.appendChild(dot2);
            typingContainer.appendChild(dot3);
            
            chatBox.appendChild(typingContainer);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            return typingContainer;
        }

        function appendMessage(text, className, adicionarBotaoVoz = true) {
            const chatBox = document.getElementById("chatHistory");
            const msgElement = document.createElement("div");
            msgElement.className = `message ${className}`;
            
            msgElement.innerHTML = text.replace(/\n/g, '<br>');

            if (className === "bot-message" && adicionarBotaoVoz) {
                const btnAudio = document.createElement("button");
                btnAudio.className = "btn-falar";
                btnAudio.innerHTML = '<span class="material-symbols-outlined">volume_up</span> Ouvir';
                btnAudio.title = "Ouvir/Parar resposta em voz alta";
                
                const textoLimpo = msgElement.innerText; 
                
                btnAudio.onclick = () => falarTexto(textoLimpo, btnAudio);
                
                msgElement.appendChild(document.createElement("br"));
                msgElement.appendChild(btnAudio);
            }

            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        function desenharGrafico(dadosDoGrafico) {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            document.getElementById('meuGrafico').style.display = 'block';
            document.getElementById('chartPlaceholder').style.display = 'none';
            document.getElementById('tituloGrafico').innerText = dadosDoGrafico.titulo;

            if (graficoAtual) graficoAtual.destroy();

            const cores = [
                'rgba(255, 107, 157, 0.85)', 
                'rgba(255, 255, 255, 0.85)', 
                'rgba(255, 180, 200, 0.85)', 
                'rgba(200, 50, 100, 0.85)'   
            ];

            graficoAtual = new Chart(ctx, {
                type: dadosDoGrafico.tipo,
                data: {
                    labels: dadosDoGrafico.labels,
                    datasets: [{
                        label: 'Estatísticas',
                        data: dadosDoGrafico.dados,
                        backgroundColor: cores,
                        borderColor: 'rgba(255, 255, 255, 0.6)',
                        borderWidth: 1.5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { top: 10, bottom: 10, left: 10, right: 10 } },
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: { color: 'white', font: { size: 11 }, boxWidth: 12, padding: 10 } 
                        },
                        tooltip: { bodyFont: { size: 11 }, titleFont: { size: 12 } }
                    },
                    scales: dadosDoGrafico.tipo === 'bar' ? {
                        y: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    } : {}
                }
            });
        }

        const btnTheme = document.getElementById('btn-theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
            btnTheme.innerHTML = 'Tema Escuro';
        }

        btnTheme.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
                btnTheme.innerHTML = 'Tema Escuro';
            } else {
                localStorage.setItem('theme', 'dark');
                btnTheme.innerHTML = 'Tema Claro';
            }
        });

        /* ========================================== */
        /* RECONHECIMENTO DE VOZ (SPEECH-TO-TEXT)    */
        /* ========================================== */
        
        let isListening = false;
        let initialValue = '';
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        const micBtn = document.getElementById('micBtn');
        const userInput = document.getElementById('userInput');

        // Configurar reconhecimento de voz
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'pt-BR'; // Idioma português brasileiro

        recognition.onstart = () => {
            isListening = true;
            initialValue = userInput.value; // Salvar valor inicial antes de adicionar voz
            micBtn.classList.add('recording');
            micBtn.title = 'Gravando... Clique para parar';
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            let finalTranscript = '';

            // Processar TODOS os resultados desde o início
            for (let i = 0; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;

                if (event.results[i].isFinal) {
                    finalTranscript += transcript + ' ';
                } else {
                    interimTranscript += transcript;
                }
            }

            // Reconstruir sempre a partir do valor inicial
            const newValue = (initialValue + ' ' + finalTranscript + interimTranscript).trim();
            userInput.value = newValue;
        };

        recognition.onend = () => {
            isListening = false;
            micBtn.classList.remove('recording');
            micBtn.title = 'Ativar microfone';
        };

        recognition.onerror = (event) => {
            console.error('Erro no reconhecimento de voz:', event.error);
            
            let mensagemErro = 'Erro ao usar o microfone';
            
            switch(event.error) {
                case 'network':
                    mensagemErro = 'Erro de rede. Verifique sua conexão.';
                    break;
                case 'no-speech':
                    mensagemErro = 'Nenhuma fala detectada. Tente novamente.';
                    break;
                case 'audio-capture':
                    mensagemErro = 'Nenhum microfone encontrado.';
                    break;
                case 'not-allowed':
                    mensagemErro = 'Permissão de microfone negada.';
                    break;
            }
            
            alert(mensagemErro);
            isListening = false;
            micBtn.classList.remove('recording');
            micBtn.title = 'Ativar microfone';
        };

        function toggleMicrophone() {
            if (isListening) {
                recognition.stop();
            } else {
                userInput.focus();
                recognition.start();
            }
        }

    </script>
</body>
</html>
